{{- /* Ingress для админ-панели. По умолчанию выключен - предпочтителен port-forward. */ -}}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tunduk.ss.fullname" . }}-admin
  labels:
    {{- include "tunduk.labels" . | nindent 4 }}
    {{- include "tunduk.ss.selectorLabels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ required "ingress.host обязателен при ingress.enabled=true" .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "tunduk.ss.fullname" . }}-admin
                port:
                  number: {{ .Values.service.admin.port }}
{{- end }}
