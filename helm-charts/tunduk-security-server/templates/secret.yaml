{{- /* Secret создаётся только если не задан готовый existingSecret. */ -}}
{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tunduk.secretName" . }}
  labels:
    {{- include "tunduk.labels" . | nindent 4 }}
    {{- include "tunduk.ss.selectorLabels" . | nindent 4 }}
type: Opaque
stringData:
  # Имена ключей совпадают с переменными окружения compose-флавора.
  XROAD_TOKEN_PIN: {{ .Values.auth.tokenPin | quote }}
  XROAD_ADMIN_USER: {{ .Values.auth.adminUser | quote }}
  XROAD_ADMIN_PASSWORD: {{ .Values.auth.adminPassword | quote }}
  # Пароль суперпользователя БД (встроенной или внешней).
  XROAD_DB_PWD: {{ .Values.postgresql.password | quote }}
{{- end }}
