# Сервер безопасности Тундук (X-Road 7.4.2) - production-стек для одной виртуалки.
#
# Образ - патч-образ Тундука (build: ../image): официальный NIIS sidecar плюс KG-класс
# профиля сертификата (KgSkKlass3, для УЦ "Кызмат"), которого нет в апстриме. Метаданные
# пакетов Тундука совпадают с NIIS, но содержимое proxy.jar отличается - без KG-класса не
# сгенерировать CSR для УЦ. Вторая часть "тундуковости" - якорь конфигурации в рантайме,
# грузится один раз при первичной настройке (см. SETUP.md).
#
# Внутри 7.4.2 встроен PostgreSQL мажора 12 - внешняя БД ОБЯЗАНА быть postgres:12
# (pg_dump/restore ломается между мажорами). Проверено на реальном образе.
#
# Все секреты/порты берутся из .env (скопируй .env.example -> .env). В этом файле и
# в образе нет ничего секретного.

services:
  db:
    image: postgres:12
    restart: unless-stopped
    environment:
      # Пароль суперпользователя. Сервер безопасности подключается этим
      # суперпользователем и сам создаёт базы и роли serverconf / messagelog / op-monitor.
      POSTGRES_PASSWORD: ${XROAD_DB_PWD:?set XROAD_DB_PWD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [xroad]

  security-server:
    # Патч-образ Тундука: официальный NIIS sidecar + KG-класс профиля сертификата
    # (KgSkKlass3, для УЦ "Кызмат"), которого нет в апстриме. Без него не сделать CSR
    # для УЦ. Сборка: docker compose up --build. Подробности - в каталоге ../image.
    image: tunduk-security-server:7.4.2
    build:
      context: ../image
    restart: unless-stopped
    depends_on:
      db:
        # Структурное лечение гонки на старте: энтрипоинт SS не ждёт БД сам,
        # поэтому стартуем его только после того, как БД станет healthy.
        condition: service_healthy
    environment:
      XROAD_TOKEN_PIN: ${XROAD_TOKEN_PIN:?set XROAD_TOKEN_PIN in .env}
      XROAD_ADMIN_USER: ${XROAD_ADMIN_USER:?set XROAD_ADMIN_USER in .env}
      XROAD_ADMIN_PASSWORD: ${XROAD_ADMIN_PASSWORD:?set XROAD_ADMIN_PASSWORD in .env}
      XROAD_DB_HOST: db          # != 127.0.0.1 -> режим внешней БД, встроенный PG не стартует
      XROAD_DB_PORT: "5432"
      XROAD_DB_PWD: ${XROAD_DB_PWD:?set XROAD_DB_PWD in .env}
      XROAD_LOG_LEVEL: ${XROAD_LOG_LEVEL:-INFO}
    ports:
      # Админ-панель - держим на loopback; доступ через SSH-туннель. (HTTPS, самоподписанный)
      - "${XROAD_ADMIN_BIND:-127.0.0.1}:4000:4000"
      # Эндпоинт health-check - только loopback.
      - "${XROAD_HEALTH_BIND:-127.0.0.1}:5588:5588"
      # Обмен сообщениями X-Road + OCSP между серверами - ДОЛЖНЫ быть доступны другим
      # серверам безопасности по сети. Публикуются на всех интерфейсах.
      - "5500:5500"
      - "5577:5577"
      # Точки доступа информационных систем (потребитель/поставщик). По умолчанию loopback
      # (ИС рядом). Чтобы принимать с внутренней ИС на классических 80/443, задай напр.
      # XROAD_IS_HTTP_PORT=80 и XROAD_IS_HTTPS_PORT=443 в .env.
      - "${XROAD_IS_HTTP_PORT:-127.0.0.1:8080}:8080"
      - "${XROAD_IS_HTTPS_PORT:-127.0.0.1:8443}:8443"
    volumes:
      # /etc/xroad - ключи, сертификаты, якорь, db.properties. ПОТЕРЯЕШЬ = перевыпуск сертификатов.
      - xroad-config:/etc/xroad
      # /var/lib/xroad - архив журнала сообщений (3 года по закону). Делай бэкап.
      - xroad-archive:/var/lib/xroad
    healthcheck:
      # Поднятая админ-панель/REST API = контейнер рабочий. Надёжно до и после регистрации.
      test: ["CMD-SHELL", "curl -kfsS https://localhost:4000 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s     # JVM-службы + первичная инициализация БД занимают время
    networks: [xroad]

volumes:
  pgdata:
  xroad-config:
  xroad-archive:

networks:
  xroad:
    driver: bridge
