# Tunduk Security Server (X-Road 7.4.2) — production single-VM stack.
#
# Image is the official, production-supported NIIS sidecar. Tunduk ships
# byte-identical NIIS packages (same maintainer + git hash), so there is no
# custom build: "Tunduk-ness" is runtime config (the global configuration
# anchor), loaded once during initial setup — see SETUP.md.
#
# Bundled PostgreSQL major in 7.4.2 is 12 — the external DB MUST be postgres:12
# (pg_dump/restore break across majors). Verified against the pulled image.
#
# All secrets/ports come from .env (copy .env.example -> .env). Nothing secret
# lives in this file or in the image.

services:
  db:
    image: postgres:12
    restart: unless-stopped
    environment:
      # Superuser password. The security server connects as this superuser to
      # auto-create the serverconf / messagelog / op-monitor databases + roles.
      POSTGRES_PASSWORD: ${XROAD_DB_PWD:?set XROAD_DB_PWD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [xroad]

  security-server:
    image: niis/xroad-security-server-sidecar:7.4.2
    restart: unless-stopped
    depends_on:
      db:
        # Structural fix for the start-up race: the SS entrypoint does not wait
        # for the DB, so we gate it on the DB being healthy.
        condition: service_healthy
    environment:
      XROAD_TOKEN_PIN: ${XROAD_TOKEN_PIN:?set XROAD_TOKEN_PIN in .env}
      XROAD_ADMIN_USER: ${XROAD_ADMIN_USER:?set XROAD_ADMIN_USER in .env}
      XROAD_ADMIN_PASSWORD: ${XROAD_ADMIN_PASSWORD:?set XROAD_ADMIN_PASSWORD in .env}
      XROAD_DB_HOST: db          # != 127.0.0.1 -> remote-DB mode, in-container PG stays off
      XROAD_DB_PORT: "5432"
      XROAD_DB_PWD: ${XROAD_DB_PWD:?set XROAD_DB_PWD in .env}
      XROAD_LOG_LEVEL: ${XROAD_LOG_LEVEL:-INFO}
    ports:
      # Admin UI — keep on loopback; reach it via SSH tunnel. (HTTPS, self-signed)
      - "${XROAD_ADMIN_BIND:-127.0.0.1}:4000:4000"
      # Health check endpoint — loopback only.
      - "${XROAD_HEALTH_BIND:-127.0.0.1}:5588:5588"
      # X-Road message exchange + inter-SS OCSP — MUST be reachable from other
      # security servers across the network. Published on all interfaces.
      - "5500:5500"
      - "5577:5577"
      # Information-system access points (consumer/producer). Default to loopback
      # (IS co-located). To accept the wiki's 80/443 from an internal IS, set e.g.
      # XROAD_IS_HTTP_PORT=80 and XROAD_IS_HTTPS_PORT=443 in .env.
      - "${XROAD_IS_HTTP_PORT:-127.0.0.1:8080}:8080"
      - "${XROAD_IS_HTTPS_PORT:-127.0.0.1:8443}:8443"
    volumes:
      # /etc/xroad — keys, certs, anchor, db.properties. LOSE THIS = reissue certs.
      - xroad-config:/etc/xroad
      # /var/lib/xroad — message-log archives (3-year legal retention). Back up.
      - xroad-archive:/var/lib/xroad
    healthcheck:
      # Admin UI/REST API up = container functional. Robust pre- and post-registration.
      test: ["CMD-SHELL", "curl -kfsS https://localhost:4000 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s     # JVM services + first-run DB setup take a while
    networks: [xroad]

volumes:
  pgdata:
  xroad-config:
  xroad-archive:

networks:
  xroad:
    driver: bridge
